name: Solicitation Center CI

on:
  pull_request:
    paths:
      - 'services/govcon/solicitation-*.js'
      - 'app/renderer/features/solicitation-center/**'
      - 'test/phase-25a*-solicitation-*.test.js'
      - 'test/solicitation-extraction-end-to-end-mapping.test.js'
      - 'docs/engineering/INCIDENT_REPORT.md'
      - '.github/workflows/solicitation-center-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: solicitation-center-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrity-diagnostic:
    name: Phase 25AR diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Run Phase 25AR with compact failure output
        shell: bash
        run: |
          set +e
          node test/phase-25ar-solicitation-summarize-and-extraction-bugs.test.js > /tmp/phase25ar.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "::error title=Phase 25AR regression failed::$(tail -n 35 /tmp/phase25ar.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
            tail -n 35 /tmp/phase25ar.log
          else
            cat /tmp/phase25ar.log
          fi
          exit "$code"

  validate:
    name: Focused extraction and renderer validation
    needs: integrity-diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Syntax checks
        run: |
          node --check services/govcon/solicitation-summarize.js
          node --check app/renderer/features/solicitation-center/summarize-and-explain.js
          node --check test/phase-25ar-solicitation-summarize-and-extraction-bugs.test.js

      - name: Phase 25AR integrity regression
        run: node test/phase-25ar-solicitation-summarize-and-extraction-bugs.test.js

      - name: Phase 25AQ FAR commercial-items extraction
        run: node test/phase-25aq-far-commercial-items-section-extraction.test.js

      - name: Phase 25AB Sections A-M extraction
        run: node test/phase-25ab-extract-sections-a-to-m.test.js

      - name: End-to-end solicitation mapping
        run: node test/solicitation-extraction-end-to-end-mapping.test.js

      - name: Phase 25AN browser handoff and local extraction
        run: node test/phase-25an-browser-handoff-local-extraction.test.js

      - name: Release safety gate
        run: npm run release:check

      - name: Diff hygiene
        run: git diff --check HEAD^ HEAD
